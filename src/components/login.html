<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
</head>

<body>
    <body>
<style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0f172a;
  color: white;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 10%;
  background: #020617;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.navbar a {
  color: #cbd5f5;
  margin-left: 20px;
  text-decoration: none;
  transition: 0.3s;
}

.navbar a:hover {
  color: #3b82f6;
}

.login-btn {
  background: #2563eb;
  padding: 8px 15px;
  border-radius: 6px;
}
.hero {
  height: 80vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(to right, #020617, #1e293b);
  text-align: center;
}

.hero h2 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  color: #94a3b8;
  margin-bottom: 20px;
}

.hero button {
  padding: 12px 25px;
  background: #3b82f6;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}
.products {
  padding: 50px 10%;
  text-align: center;
}

.products h2 {
  margin-bottom: 30px;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 30px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: #334155;
}
.login-container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-form {
  background: #1e293b;
  padding: 30px;
  width: 350px;
  border-radius: 15px;
  text-align: center;
}

.login-form h2 {
  margin-bottom: 20px;
}

.login-form input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: none;
  border-radius: 8px;
  background: #334155;
  color: white;
}

.login-form button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.login-form button:hover {
  background: #1d4ed8;
}

.extra {
  margin-top: 10px;
  font-size: 14px;
}

.extra a {
  color: #3b82f6;
}
</style>

<nav class="navbar">
  <h2> VoteNow</h2>
  <a href="index.html" class="btn">Home</a>
</nav>

<div class="card">
  <h2 id="title">Login</h2>
  <p id="error" class="error"></p>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button id="mainBtn">Log In</button> 

  <div class="divider">OR</div>

  <button id="googleBtn" class="google-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
    Sign in with Google
  </button>

  <p class="switch-text">
    <span id="switchMsg">Don't have an account?</span>
    <a href="#" id="switchLink">Sign Up</a>
  </p>
</div>

<script type="module" src="../firebase.js"></script>
</body>
</body>
</html>
