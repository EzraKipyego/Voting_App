<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Auth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <style>
    body {
    font-family: sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: white;
    padding: 2rem;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    width: 320px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 5px;
}

#mainBtn { background: #007bff; color: white; }
#mainBtn:hover { background: #0056b3; }

.google-btn {
    background: white;
    border: 1px solid #ddd;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}
.google-btn:hover { background: #f8f9fa; }

.divider { margin: 15px 0; color: #888; font-size: 0.8rem; }
.error { color: red; font-size: 0.9rem; min-height: 1.2em; }
.switch-text { margin-top: 15px; font-size: 0.9rem; }
a { color: #007bff; text-decoration: none; }
  </style>

    <div class="card">
        <h2 id="title">Login</h2>
        <p id="error" class="error"></p>
        
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        
        <button id="mainBtn">Log In</button>
        
        <div class="divider">OR</div>
        
        <button id="googleBtn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Sign in with Google
        </button>

        <p class="switch-text">
            <span id="switchMsg">Don't have an account?</span> 
            <a href="#" id="switchLink">Sign Up</a>
        </p>
    </div>

    <!-- Import Firebase -->
    <script type="module" src="app.js"></script>
</body>
</html>
